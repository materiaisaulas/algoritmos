<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Flutter Book</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="stylesheet" href="assets/css/custom.css">
</head>

<body>

  <div class="topbar">

    <div class="logo">
      Flutter Book
    </div>

    <div class="search">
      <input type="text" placeholder="Pesquisar...">
    </div>

    <div class="icons">
      <span>✉️</span>
      <span>👤</span>
      <span>🎤</span>
    </div>

  </div>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'Flutter book',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      copyCode: {
        buttonText: 'Copiar',
        errorText: 'Erro',
        successText: 'Copiado'
      }
    }

  </script>
  <script>
      (function () {

        function imgTextPlugin(hook) {

          hook.beforeEach(function (markdown) {

            const regex = /:::imgtext\s+(.*?)\n([\s\S]*?):::/g;

            return markdown.replace(regex, function (_, img, content) {

              return `
<div class="doc-image-text">
  <img src="${img}">
  <div class="doc-image-text-content">

${content}

  </div>
</div>
`
            })
          })
        }

        window.$docsify = window.$docsify || {};
        window.$docsify.plugins = [].concat(imgTextPlugin, window.$docsify.plugins || []);

      })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>

</body>

</html>
