<svg width="760" height="220" xmlns="http://www.w3.org/2000/svg">
    <style>
        .t{font:700 22px Arial}
        .label{font:700 18px Arial}
        .value{font:700 26px Arial}
        .box{fill:#eef2ff;stroke:#3b82f6;stroke-width:2}
        .mem{fill:#f8fafc;stroke:#334155;stroke-width:2}
</style>

    <text x="30" y="35" class="t">Variável como rótulo de uma posição da memória</text>

    <rect x="80" y="90" width="180" height="80" class="box" />
    <text x="145" y="125" class="label">idade</text>

    <rect x="360" y="90" width="180" height="80" class="mem" />
    <text x="435" y="130" class="value">20</text>

    <line x1="260" y1="130" x2="360" y2="130" stroke="#374151" stroke-width="2" />
</svg>