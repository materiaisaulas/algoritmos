<svg width="820" height="250" xmlns="http://www.w3.org/2000/svg">
    <style>
        .t{font:700 22px Arial}
        .code{font:700 24px Consolas}
        .txt{font:16px Arial}
        .box{fill:#ecfeff;stroke:#0891b2;stroke-width:2}
        .mem{fill:#f8fafc;stroke:#334155;stroke-width:2}
</style>

    <text x="30" y="35" class="t">Processo de atribuição</text>

    <text x="40" y="80" class="code">salario = 1500</text>

    <rect x="260" y="60" width="160" height="90" class="box" />
    <text x="310" y="95" class="txt">variável</text>
    <text x="320" y="120" class="code">salario</text>

    <rect x="520" y="60" width="160" height="90" class="mem" />
    <text x="580" y="95" class="txt">valor</text>
    <text x="585" y="120" class="code">1500</text>

    <line x1="420" y1="105" x2="520" y2="105" stroke="#374151" stroke-width="2" />
</svg>